name: Deploy Magpie Blogs

on:
  workflow_dispatch:
  push:
    branches:
      - main
    # Strict conditional filter: Only trigger if files in these paths change
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/deploy-blogs.yml"

# Allow this job to clone the repo and securely write the built HTML to your gh-pages branch
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch all history so plugins can read git creation/modification dates if needed
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material

      - name: Configure Git Bot Credentials
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build and Deploy via MkDocs
        working-directory: docs
        run: |
          mkdocs gh-deploy --force