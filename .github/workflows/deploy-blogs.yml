name: Deploy Magpie Blogs

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/deploy-blogs.yml"

# Core permissions required for pure GitHub Actions deployments
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment to avoid race conditions
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material

      - name: Build Static HTML Site
        # Runs inside your blog folder and compiles raw markdown into an 'site' directory
        working-directory: docs
        run: |
          mkdocs build

      - name: Upload Static Website Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Tells GitHub to look inside your built HTML folder (relative to root)
          path: docs/site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4